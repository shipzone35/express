<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Zone express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { text-align: center; color: #1a1a2e; margin-bottom: 25px; }
    h1 span { color: #e94560; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; }
    input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
    .radio-group { display: flex; gap: 10px; }
    .radio-option { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; }
    .radio-option.selected { border-color: #e94560; background: #ffeef2; }
    button { width: 100%; padding: 15px; background: linear-gradient(135deg, #e94560, #0f3460); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-red { background: #dc3545; margin-top: 10px; }
    .tabs { display: flex; margin-bottom: 20px; gap: 8px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: #f0f0f0; border-radius: 8px; font-size: 12px; }
    .tab.active { background: #e94560; color: white; }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .total-box { background: #28a745; color: white; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: bold; }
    .total-box.negative { background: #dc3545; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
    th { background: #e94560; color: white; }
    .shipping-note { font-size: 12px; color: #666; margin-top: 5px; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚚 Ship <span>Zone</span></h1>
    
    <div id="loginSection">
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="loginEmail" placeholder="الإيميل">
      </div>
      <div class="form-group">
        <label>🔑 Password</label>
        <input type="password" id="loginPassword" placeholder="الباسورد">
      </div>
      <button id="loginBtn">🔐 دخول</button>
    </div>
    
    <div id="appSections" style="display:none;">
      <div style="background:#28a745;color:white;padding:12px;border-radius:8px;text-align:center;margin-bottom:15px;font-size:16px">
        👤 <span id="companyName"></span>
      </div>
      
      <div class="tabs">
        <div class="tab" onclick="showTab('new')">📦 طلب</div>
        <div class="tab" onclick="showTab('myorders')">💰 طلباتي</div>
        <div class="tab" onclick="showTab('track')">🔍 بحث</div>
      </div>
      
      <form id="orderForm" class="form-section">
        <div class="form-group">
          <label>👤 اسم العميل</label>
          <input type="text" name="clientName" required>
        </div>
        <div class="form-group">
          <label>📱 الهاتف</label>
          <input type="tel" name="phone" required>
        </div>
        
        <div class="form-group">
          <label>📍 المحافظة</label>
          <select id="governorateSelect" name="governorate" onchange="updateRegionsAndShipping()" required>
            <option value="">-- اختر المحافظة --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🗺️ المنطقة / المدينة</label>
          <select id="regionSelect" name="region" required disabled>
            <option value="">-- اختر المحافظة أولاً --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🏠 العنوان بالتفصيل</label>
          <input type="text" name="address" required placeholder="اسم الشارع، رقم العقار...">
        </div>
        <div class="form-group">
          <label>📦 الحجم</label>
          <select name="weight" required>
            <option value="">-- اختر --</option>
            <option value="صغير">صغير</option>
            <option value="متوسط">متوسط</option>
            <option value="كبير">كبير</option>
          </select>
        </div>
        <div class="form-group">
          <label>💰 المبلغ الكلي المستلم من العميل</label>
          <input type="number" name="collectionAmount" step="any" min="-99999" value="0" required>
        </div>
        <div class="form-group">
          <label id="shippingLabel">💵 خصم مصاريف الشحن؟</label>
          <div class="radio-group">
            <div class="radio-option selected" id="radioYes" onclick="selectRadio('نعم')">نعم</div>
            <div class="radio-option" id="radioNo" onclick="selectRadio('لا')">لا</div>
          </div>
          <div id="shippingCostNote" class="shipping-note">يرجى اختيار محافظة لمعرفة سعر الشحن</div>
        </div>
        <button type="submit">🚀 إرسال</button>
      </form>
      
      <div id="myOrdersForm" class="form-section">
        <button onclick="loadMyOrders()">🔍 تحميل وتحديث البيانات</button>
        <div id="ordersTableContainer"></div>
      </div>
      
      <form id="trackForm" class="form-section">
        <div class="form-group">
          <label>📱 الهاتف</label>
          <input type="tel" id="searchPhone" required>
        </div>
        <button type="submit">🔍 بحث</button>
        <div id="statusResult"></div>
      </form>
      
      <button class="btn-red" onclick="logout()">🚪 تسجيل خروج</button>
    </div>
  </div>

  <script>
    var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJpsFk_3mj4ViJiAxYEjI2zm9MnVO_8sWhZ2kdlLCBvdPrchO8foT40FpZaLHtwPaC/exec";
    var selectedWithShipping = 'نعم';
    var currentShippingCost = 0; // متغير ديناميكي لحفظ تكلفة شحن المحافظة المحددة
    
    // قاعدة بيانات المحافظات والمناطق وأسعار الشحن بناءً على صورتك
    var locationData = {
      "القاهرة": { cost: 65, regions: ["وسط البلد", "مصر الجديدة", "مدينة نصر", "المعادي", "التجمع الخامس", "شبرا", "حلوان", "عين شمس", "المرج"] },
      "الجيزة": { cost: 70, regions: ["الدقي", "المهندسين", "الهرم", "فيصل", "6 أكتوبر", "الشيخ زايد", "العجوزة", "امبابة"] },
      "الإسكندرية": { cost: 85, regions: ["سموحة", "مصر الجديدة", "المنشية", "العجمي", "ميامي", "سيدي بشر", "برج العرب"] },
      "القليوبية": { cost: 85, regions: ["بنها", "شبرا الخيمة", "قليوب", "الخانكة", "طوخ", "القناطر الخيرية"] },
      "المنوفية": { cost: 85, regions: ["شبين الكوم", "أشمون", "منوف", "السادات", "قويسنا", "تلا"] },
      "الغربية": { cost: 85, regions: ["طنطا", "المحلة الكبرى", "كفر الزيات", "زفتى", "بسيون"] },
      "الدقهلية": { cost: 85, regions: ["المنصورة", "ميت غمر", "السنبلاوين", "طلخا", "دكرنس"] },
      "كفر الشيخ": { cost: 85, regions: ["كفر الشيخ المدينة", "دسوق", "مطوبس", "فوه", "بلطيم"] },
      "دمياط": { cost: 85, regions: ["دمياط المدينة", "دمياط الجديدة", "رأس البر", "فارسكور"] },
      "بورسعيد": { cost: 85, regions: ["حي الشرق", "حي العرب", "حي الضواحي", "بورفؤاد"] },
      "الإسماعيلية": { cost: 85, regions: ["الإسماعيلية المدينة", "الفايد", "القنطرة شرق", "القنطرة غرب"] },
      "السويس": { cost: 85, regions: ["حي السويس", "حي الأربعين", "حي الجناين", "بورتوفيق"] },
      "الشرقية": { cost: 85, regions: ["الزقازيق", "العاشر من رمضان", "بلبيس", "فاقوس", "أبو حماد"] },
      "البحيرة": { cost: 85, regions: ["دمنهور", "كفر الدوار", "إيتاي البارود", "كوم حمادة", "رشيد"] },
      "الفيوم": { cost: 110, regions: ["الفيوم المدينة", "إطسا", "سنورس", "طامية"] },
      "بني سويف": { cost: 110, regions: ["بني سويف المدينة", "الواسطى", "ببا", "الفشن"] },
      "المنيا": { cost: 110, regions: ["المنيا المدينة", "ملوي", "بني مزار", "مغاغة", "سمالوط"] },
      "أسيوط": { cost: 110, regions: ["أسيوط المدينة", "ديروط", "منفلوط", "القوصية", "أبو تيج"] },
      "سوهاج": { cost: 110, regions: ["سوهاج المدينة", "طهطا", "أخميم", "جرجا", "البلينا"] },
      "قنا": { cost: 110, regions: ["قنا المدينة", "نجع حمادي", "دشنا", "قوص"] },
      "الأقصر": { cost: 110, regions: ["الأقصر المدينة", "إسنا", "أرمنت", "القرنة"] },
      "أسوان": { cost: 110, regions: ["أسوان المدينة", "كوم أمبو", "إدفو", "نصر النوبة"] },
      "مرسى مطروح": { cost: 140, regions: ["مطروح المدينة", "الضبعة", "العلمين", "سيوة"] },
      "الوادي الجديد": { cost: 140, regions: ["الخارجة", "الداخلة", "الفرافرة"] },
      "البحر الأحمر": { cost: 140, regions: ["الغردقة", "سفاجا", "القصير", "رأس غارب"] },
      "العين السخنة": { cost: 140, regions: ["منطقة الفنادق والقرى"] },
      "الساحل الشمالي": { cost: 140, regions: ["قرى الساحل"] }
    };

    // تعبئة قائمة المحافظات عند فتح الصفحة
    window.onload = function() {
      var govSelect = document.getElementById('governorateSelect');
      for (var gov in locationData) {
        var opt = document.createElement('option');
        opt.value = gov;
        opt.innerHTML = gov;
        govSelect.appendChild(opt);
      }
    };

    // تحديث المناطق وسعر الشحن عند تغيير المحافظة
    function updateRegionsAndShipping() {
      var govSelect = document.getElementById('governorateSelect');
      var regionSelect = document.getElementById('regionSelect');
      var note = document.getElementById('shippingCostNote');
      var label = document.getElementById('shippingLabel');
      
      var selectedGov = govSelect.value;
      
      if (!selectedGov) {
        regionSelect.innerHTML = '<option value="">-- اختر المحافظة أولاً --</option>';
        regionSelect.disabled = true;
        currentShippingCost = 0;
        note.innerHTML = 'يرجى اختيار محافظة لمعرفة سعر الشحن';
        label.innerHTML = '💵 خصم مصاريف الشحن؟';
        return;
      }
      
      // تحديث سعر الشحن
      currentShippingCost = locationData[selectedGov].cost;
      note.innerHTML = 'تكلفة الشحن لهذه المحافظة هي: ' + currentShippingCost + ' ج.م';
      label.innerHTML = '💵 خصم مصاريف الشحن (' + currentShippingCost + ' ج.م)؟';
      
      // تحديث قائمة المناطق
      regionSelect.innerHTML = '<option value="">-- اختر المنطقة / المدينة --</option>';
      var regions = locationData[selectedGov].regions;
      for (var i = 0; i < regions.length; i++) {
        var opt = document.createElement('option');
        opt.value = regions[i];
        opt.innerHTML = regions[i];
        regionSelect.appendChild(opt);
      }
      regionSelect.disabled = false;
    }

    var companies = {
      'baobaag@shipzone.com': {pass: '123456', name: 'Baobaaag'},
      'sneakerzone@shipzone.com': {pass: '123123', name: 'SneakerZone'},
      'ahmed@gmail.com': {pass: '5555', name: 'محلات أحمد'},
      'omar@gmail.com': {pass: '8888', name: 'عمر للتجارة'},
      'ali@gmail.com': {pass: '4444', name: 'متجر علي'}
    };
    
    document.getElementById('loginBtn').onclick = function() {
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;
      
      if (companies[email] && companies[email].pass === password) {
        localStorage.setItem('userCompany', companies[email].name);
        localStorage.setItem('userEmail', email);
        document.getElementById('companyName').textContent = companies[email].name;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSections').style.display = 'block';
      } else {
        alert('بيانات خاطئة');
      }
    };
    
    function logout() {
      localStorage.removeItem('userCompany');
      localStorage.removeItem('userEmail');
      location.reload();
    }
    
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.form-section').forEach(function(f) { f.classList.remove('active'); });
      if (tab === 'new') { document.querySelectorAll('.tab')[0].classList.add('active'); document.getElementById('orderForm').classList.add('active'); }
      else if (tab === 'myorders') { document.querySelectorAll('.tab')[1].classList.add('active'); document.getElementById('myOrdersForm').classList.add('active'); }
      else { document.querySelectorAll('.tab')[2].classList.add('active'); document.getElementById('trackForm').classList.add('active'); }
    }
    
    function selectRadio(v) {
      selectedWithShipping = v;
      document.getElementById('radioYes').classList.remove('selected');
      document.getElementById('radioNo').classList.remove('selected');
      document.getElementById('radio' + v).classList.add('selected');
    }
    
    document.getElementById('orderForm').onsubmit = async function(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button');
      var company = localStorage.getItem('userCompany');
      
      var inputAmount = parseFloat(this.collectionAmount.value);
      if (isNaN(inputAmount)) inputAmount = 0; 
      
      var finalAmount = inputAmount;
      
      // خصم شحن المحافظة المحددة ديناميكياً
      if (selectedWithShipping === 'نعم') {
        finalAmount = inputAmount - currentShippingCost; 
      }
      
      // دمج المحافظة والمنطقة والعنوان بالتفصيل لإرسالهم لـ Google Sheets
      var fullAddress = this.governorate.value + " - " + this.region.value + " - " + this.address.value;
      
      var url = SCRIPT_URL + '?action=add' +
        '&company=' + encodeURIComponent(company) +
        '&clientName=' + encodeURIComponent(this.clientName.value) +
        '&phone=' + encodeURIComponent(this.phone.value) +
        '&address=' + encodeURIComponent(fullAddress) +
        '&weight=' + encodeURIComponent(this.weight.value) +
        '&collectionAmount=' + finalAmount + 
        '&withShipping=' + encodeURIComponent(selectedWithShipping);
      
      btn.textContent = '⏳...';
      btn.disabled = true;
      
      try { 
        var response = await fetch(url, {method: 'GET'});
        alert('✅ تم إرسال الطلب! المبلغ المستحق: ' + finalAmount + ' ج.م'); 
        this.reset();
        this.collectionAmount.value = "0"; 
        selectRadio('نعم');
        updateRegionsAndShipping(); // إعادة ضبط حقول المحافظات
      }
      catch(err) { 
        alert('❌ خطأ: ' + err.message); 
        console.error(err);
      }
      
      btn.textContent = '🚀 إرسال';
      btn.disabled = false;
    };
    
    document.getElementById('trackForm').onsubmit = async function(e) {
      e.preventDefault();
      var phone = this.searchPhone.value;
      var company = localStorage.getItem('userCompany');
      var r = document.getElementById('statusResult');
      r.textContent = '⏳...';
      try {
        var res = await fetch(SCRIPT_URL + '?company=' + encodeURIComponent(company) + '&phone=' + phone);
        var data = await res.json();
        if (data.orders && data.orders.length) {
          var o = data.orders[data.orders.length-1];
          r.innerHTML = '<div style="background:#d4edda;padding:15px;border-radius:8px;margin-top:10px"><h3>'+o.client+'</h3><h2>'+o.status+'</h2><p>💰 '+o.amount+'</p></div>';
        } else { r.innerHTML = '<p style="color:red">❌ لا يوجد</p>'; }
      } catch(err) { r.innerHTML = '<p style="color:red">❌ خطأ</p>'; }
    };
    
    async function loadMyOrders() {
      var company = localStorage.getItem('userCompany');
      var c = document.getElementById('ordersTableContainer');
      c.textContent = '⏳...';
      try {
        var res = await fetch(SCRIPT_URL + '?company=' + encodeURIComponent(company));
        var data = await res.json();
        if (data.orders && data.orders.length) {
          var t = '<table><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>تم الحساب</th></tr>';
          var totalNotAccounted = 0;
          
          for (var i = 0; i < data.orders.length; i++) {
            var s = data.orders[i];
            var accounted = s.accounted || '';
            var isAccounted = (accounted === 'تم' || accounted === 'نعم' || accounted === 'yes' || accounted === '✓');
            
            var rawAmount = String(s.amount || '0').trim();
            var parsedAmount = 0;
            
            if (rawAmount.startsWith('(') && rawAmount.endsWith(')')) {
              parsedAmount = -parseFloat(rawAmount.replace(/[^\d.]/g, '')) || 0;
            } else {
              var cleanAmount = rawAmount.replace(/[^-\d.]/g, '');
              parsedAmount = parseFloat(cleanAmount) || 0;
            }
            
            if (!isAccounted) {
              totalNotAccounted += parsedAmount;
            }
            
            t += '<tr>';
            t += '<td>' + s.date + '</td>';
            t += '<td>' + s.client + '</td>';
            t += '<td style="direction:ltr;' + (parsedAmount < 0 ? 'color:red;font-weight:bold;' : '') + '">' + s.amount + '</td>';
            t += '<td style="color:' + (s.status === 'تم التسليم' ? 'green' : 'orange') + '">' + s.status + '</td>';
            t += '<td>' + (isAccounted ? '✅' : '❌') + '</td>';
            t += '</tr>';
          }
          
          t += '</table>';
          
          var totalClass = totalNotAccounted < 0 ? 'total-box negative' : 'total-box';
          t += '<div class="' + totalClass + '"> الإجمالي الغير محاسب: ' + totalNotAccounted.toFixed(2) + ' EGP</div>';
          c.innerHTML = t;
        } else {
          c.innerHTML = '<p style="color:#666">لا توجد طلبات</p>';
        }
      } catch(err) {
        c.innerHTML = '<p style="color:red">❌ خطأ: ' + err.message + '</p>';
      }
    }
  </script>
</body>
</html>
