<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Zone Express</title>
  <!-- مكتبة الأيقونات للحالات المختلفة -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #111111;
      --secondary-color: #333333;
      --accent-color: #00b4d8;
      --bg-gradient: linear-gradient(135deg, #f4f7f6, #e9ecef);
      --card-bg: #ffffff;
      --text-main: #2b2d42;
      --text-muted: #6c757d;
      --success: #2ec4b6;
      --danger: #e63946;
      --warning: #f7a072;
      --info: #00b4d8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body { 
      background: var(--bg-gradient); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 15px;
      color: var(--text-main);
    }
    
    .container { 
      background: var(--card-bg); 
      padding: 30px 20px; 
      border-radius: 24px; 
      width: 100%; 
      max-width: 650px; /* زيادة العرض لتناسب جداول الحالات بشكل مريح */
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-container img {
      max-width: 200px;
      height: auto;
    }
    
    .form-group { margin-bottom: 20px; }
    
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: var(--secondary-color); 
      font-weight: 600;
      font-size: 14px;
    }
    
    input, select { 
      width: 100%; 
      padding: 14px; 
      border: 2px solid #e2e8f0; 
      border-radius: 12px; 
      font-size: 14px; 
      color: var(--text-main);
      background-color: #f8fafc;
      transition: all 0.2s ease-in-out;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      background-color: #fff;
      outline: none;
      box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05);
    }
    
    .radio-group { display: flex; gap: 12px; margin-top: 5px; }
    
    .radio-option { 
      flex: 1; 
      padding: 12px; 
      border: 2px solid #e2e8f0; 
      border-radius: 12px; 
      text-align: center; 
      cursor: pointer; 
      font-weight: 600;
      font-size: 14px;
      background: #f8fafc;
      transition: all 0.2s ease;
    }
    
    .radio-option.selected { 
      border-color: var(--primary-color); 
      background: var(--primary-color);
      color: #fff;
    }
    
    button { 
      width: 100%; 
      padding: 15px; 
      background: var(--primary-color); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(17,17,17,0.15);
    }

    button:hover {
      background: #222222;
      transform: translateY(-1px);
    }
    
    .btn-red { background: #222; margin-top: 15px; border: 2px solid #e2e8f0; color: var(--danger); box-shadow: none; }
    .btn-red:hover { background: #fff5f5; border-color: var(--danger); }
    
    /* شريط التبويبات المطور القابل للسحب (Horizontal Scroll) على الموبايل */
    .tabs-wrapper {
      overflow-x: auto;
      white-space: nowrap;
      margin-bottom: 25px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 14px;
      scrollbar-width: none; /* إخفاء شريط التمرير في فايرفوكس */
    }
    
    .tabs-wrapper::-webkit-scrollbar {
      display: none; /* إخفاء شريط التمرير في كروم وسفاري */
    }

    .tabs { 
      display: inline-flex; 
      gap: 6px; 
    }
    
    .tab { 
      padding: 10px 16px; 
      text-align: center; 
      cursor: pointer; 
      border-radius: 10px; 
      font-size: 13px; 
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s ease;
      display: inline-block;
    }
    
    .tab.active { 
      background: #ffffff; 
      color: var(--primary-color); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    
    .form-section { display: none; animation: fadeIn 0.4s ease; }
    .form-section.active { display: block; }
    
    .total-box { 
      background: var(--success); 
      color: white; 
      padding: 16px; 
      border-radius: 12px; 
      margin-top: 20px; 
      text-align: center; 
      font-weight: bold; 
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(46, 196, 182, 0.2);
    }
    .total-box.negative { 
      background: var(--danger); 
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);
    }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; font-size: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
    th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; color: var(--secondary-color); font-weight: 700; border-bottom: 2px solid #e2e8f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: #f8fafc; }
    
    .shipping-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-style: italic; }
    
    .company-badge {
      background: #f1f5f9;
      color: var(--primary-color);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: 700;
      border: 1px dashed #cbd5e1;
    }

    .status-badge-inline {
      padding: 6px 10px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn {
      margin-bottom: 15px;
      background: #f1f5f9;
      color: var(--primary-color);
      border: 1px solid #cbd5e1;
      box-shadow: none;
    }
    .refresh-btn:hover {
      background: #e2e8f0;
    }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 30px 10px;
      font-size: 14px;
    }

    .empty-state i {
      font-size: 32px;
      margin-bottom: 10px;
      display: block;
      color: #cbd5e1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logo.jpg" alt="ShipZone Logo">
    </div>
    
    <div id="loginSection">
      <div class="form-group">
        <label>📧 البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label>🔑 كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button id="loginBtn">🔐 تسجيل الدخول</button>
    </div>
    
    <div id="appSections" style="display:none;">
      <div class="company-badge">
        👤 متجر: <span id="companyName"></span>
      </div>
      
      <!-- شريط التبويبات الـ 8 المتقسم بدقة تامة -->
      <div class="tabs-wrapper">
        <div class="tabs">
          <div class="tab" onclick="showTab('new')">📦 طلب جديد</div>
          <div class="tab" onclick="showTab('financial')">💰 الحسابات والمالية</div>
          <div class="tab" id="tab_delivering" onclick="showTab('delivering')">🚚 قيد التوصيل</div>
          <div class="tab" id="tab_in_warehouse" onclick="showTab('in_warehouse')">🏢 في المخزن</div>
          <div class="tab" id="tab_delivered" onclick="showTab('delivered')">✅ تم التسليم</div>
          <div class="tab" id="tab_failed" onclick="showTab('failed')">❌ تعذر التسليم</div>
          <div class="tab" id="tab_waiting" onclick="showTab('waiting')">⏳ انتظار الشحن</div>
          <div class="tab" id="tab_redelivery" onclick="showTab('redelivery')">🔄 إعادة التوصيل</div>
        </div>
      </div>
      
      <!-- 1. شاشة طلب جديد -->
      <form id="orderForm" class="form-section">
        <div class="form-group">
          <label>👤 اسم العميل</label>
          <input type="text" name="clientName" required placeholder="الاسم ثلاثي">
        </div>
        <div class="form-group">
          <label>📱 رقم الهاتف</label>
          <input type="tel" name="phone" required placeholder="01xxxxxxxxx">
        </div>
        
        <div class="form-group">
          <label>📍 المحافظة</label>
          <select id="governorateSelect" name="governorate" onchange="updateRegionsAndShipping()" required>
            <option value="">-- اختر المحافظة --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🗺️ المنطقة / المدينة / المركز</label>
          <select id="regionSelect" name="region" required disabled>
            <option value="">-- اختر المحافظة أولاً --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🏠 العنوان بالتفصيل</label>
          <input type="text" name="address" required placeholder="اسم الشارع، رقم العقار، الدور...">
        </div>
        <div class="form-group">
          <label>📦 حجم الشحنة</label>
          <select name="weight" required>
            <option value="">-- اختر الحجم --</option>
            <option value="صغير">صغير (طرد عادي)</option>
            <option value="متوسط">متوسط (وزن متوسط)</option>
            <option value="كبير">كبير (وزن ثقيل)</option>
          </select>
        </div>
        <div class="form-group">
          <label>💰 المبلغ الكلي المستلم من العميل</label>
          <input type="number" name="collectionAmount" step="any" min="-99999" value="0" required>
        </div>
        <div class="form-group">
          <label id="shippingLabel">💵 خصم مصاريف الشحن؟</label>
          <div class="radio-group">
            <div class="radio-option selected" id="radioYes" onclick="selectRadio('نعم')">نعم</div>
            <div class="radio-option" id="radioNo" onclick="selectRadio('لا')">لا</div>
          </div>
          <div id="shippingCostNote" class="shipping-note">يرجى اختيار محافظة لمعرفة سعر الشحن</div>
        </div>
        <button type="submit">🚀 إرسال الطلب للسيستم</button>
      </form>
      
      <!-- 2. شاشة الحسابات والمالية -->
      <div id="financialSection" class="form-section">
        <button class="refresh-btn" onclick="loadFinancialData()">🔄 تحديث كشف الحساب والماليات</button>
        <div id="financialTableContainer"></div>
      </div>
      
      <!-- 3. شاشات عرض الحالات الديناميكية (كل الحالات تستخدم نفس الحاوية المرنة لسهولة الإدارة) -->
      <div id="statusSection" class="form-section">
        <button class="refresh-btn" onclick="refreshCurrentStatusTab()">🔄 تحديث البيانات الآن</button>
        <div id="statusTableContainer"></div>
      </div>
      
      <button class="btn-red" onclick="logout()">🚪 تسجيل خروج</button>
    </div>
  </div>

  <script>

    // دالة لتحديد الأيقونة واللون لكل حالة من الحالات المحددة بدقة
    function getStatusDetails(status) {
      var s = String(status).trim();
      switch(s) {
        case 'قيد التوصيل':
          return { icon: 'fa-truck-fast', color: 'var(--warning)', bg: '#fffbeb', text: 'قيد التوصيل' };

          return { icon: 'fa-warehouse', color: 'var(--info)', bg: '#f0f9ff', text: 'في المخزن' };

        case 'مرفوض':

      "الأقصر": { cost: 110, regions: ["الأقصر المدينة", "الأقصر الجديدة", "طيبة الجديدة", "البياضية", "القرنة", "أرمنت", "إسنا", "الطود"] },
      "أسوان": { cost: 110, regions: ["أسوان المدينة", "أسوان الجديدة", "كوم أمبو", "إدفو", "نصر النوبة", "دراو", "ابو سمبل السياحية"] },
      "مرسى مطروح": { cost: 140, regions: ["مطروح المدينة", "الضبعة", "العلمين", "سيدي عبد الرحمن", "الحمام", "النجيلة", "براني", "السلوم", "سيوة"] },
      "الوادي الجديد": { cost: 140, regions: ["الخارجة", "الداخلة", "الفرافرة", "باريس", "بلاط"] },
      "البحر الأحمر": { cost: 140, regions: ["الغردقة", "سفاجا", "القصير", "رأس غارب", "مرسى علم", "شلاتين", "حلايب"] }
    };

    window.onload = function() {
      var govSelect = document.getElementById('governorateSelect');
      for (var gov in locationData) {
        var opt = document.createElement('option');
        opt.value = gov;
        opt.innerHTML = gov;
        govSelect.appendChild(opt);
      }
      
      if(localStorage.getItem('userCompany')) {
        document.getElementById('companyName').textContent = localStorage.getItem('userCompany');
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSections').style.display = 'block';
        showTab('new');
      }
    };

    function updateRegionsAndShipping() {
      var govSelect = document.getElementById('governorateSelect');
      var regionSelect = document.getElementById('regionSelect');
      var note = document.getElementById('shippingCostNote');
      var label = document.getElementById('shippingLabel');
      var selectedGov = govSelect.value;
      
      if (!selectedGov) {
        regionSelect.innerHTML = '<option value="">-- اختر المحافظة أولاً --</option>';
        regionSelect.disabled = true;
        currentShippingCost = 0;
        note.innerHTML = 'يرجى اختيار محافظة لمعرفة سعر الشحن';
        label.innerHTML = '💵 خصم مصاريف الشحن؟';
        return;
      }
      
      currentShippingCost = locationData[selectedGov].cost;
      note.innerHTML = 'تكلفة الشحن لهذه المحافظة هي: ' + currentShippingCost + ' ج.م';
      label.innerHTML = '💵 خصم مصاريف الشحن (' + currentShippingCost + ' ج.م)؟';
      
      regionSelect.innerHTML = '<option value="">-- اختر المنطقة / المدينة / المركز --</option>';
      var regions = locationData[selectedGov].regions;
      for (var i = 0; i < regions.length; i++) {
        var opt = document.createElement('option');
        opt.value = regions[i];
        opt.innerHTML = regions[i];
        regionSelect.appendChild(opt);
      }
      regionSelect.disabled = false;
    }

    var companies = {
      'baobaag@shipzone.com': {pass: '123456', name: 'Baobaaag'},
      'sneakerzone@shipzone.com': {pass: '123123', name: 'SneakerZone'},
      'ahmed@gmail.com': {pass: '5555', name: 'محلات أحمد'},
      'omar@gmail.com': {pass: '8888', name: 'عمر للتجارة'},
      'ali@gmail.com': {pass: '4444', name: 'متجر علي'}
    };
    
    document.getElementById('loginBtn').onclick = function() {
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;
      
      if (companies[email] && companies[email].pass === password) {
        localStorage.setItem('userCompany', companies[email].name);
        localStorage.setItem('userEmail', email);
        document.getElementById('companyName').textContent = companies[email].name;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSections').style.display = 'block';
        showTab('new');
      } else {
        alert('بيانات خاطئة');
      }
    };
    
    function logout() {
      localStorage.removeItem('userCompany');
      localStorage.removeItem('userEmail');
      location.reload();
    }
    
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.form-section').forEach(function(f) { f.classList.remove('active'); });
      
      if (tab === 'new') { 
        document.querySelectorAll('.tab')[0].classList.add('active'); 
        document.getElementById('orderForm').classList.add('active'); 
      }
      else if (tab === 'financial') { 
        document.querySelectorAll('.tab')[1].classList.add('active'); 
        document.getElementById('financialSection').classList.add('active'); 
        loadFinancialData(); 
      }
      else {
        // لشاشات تصفية الحالات الفردية
        var tabIdMap = {
          'delivering': 'tab_delivering',
          'in_warehouse': 'tab_in_warehouse',
          'delivered': 'tab_delivered',
          'failed': 'tab_failed',
          'waiting': 'tab_waiting',
          'redelivery': 'tab_redelivery'
        };
        
        document.getElementById(tabIdMap[tab]).classList.add('active');
        document.getElementById('statusSection').classList.add('active');
        
        currentActiveStatus = tab;
        renderFilteredStatus(tab);
      }
    }
    
    function selectRadio(v) {
      selectedWithShipping = v;
      document.getElementById('radioYes').classList.remove('selected');
      document.getElementById('radioNo').classList.remove('selected');
      document.getElementById('radio' + v).classList.add('selected');
    }
    
    document.getElementById('orderForm').onsubmit = async function(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button');
      var company = localStorage.getItem('userCompany');
      var inputAmount = parseFloat(this.collectionAmount.value);
      if (isNaN(inputAmount)) inputAmount = 0; 
      
      var finalAmount = inputAmount;
      if (selectedWithShipping === 'نعم') {
        finalAmount = inputAmount - currentShippingCost; 
      }
      
      var fullAddress = this.governorate.value + " - " + this.region.value + " - " + this.address.value;
      
      var url = SCRIPT_URL + '?action=add' +
        '&company=' + encodeURIComponent(company) +
        '&clientName=' + encodeURIComponent(this.clientName.value) +
        '&phone=' + encodeURIComponent(this.phone.value) +
        '&address=' + encodeURIComponent(fullAddress) +
        '&weight=' + encodeURIComponent(this.weight.value) +
        '&collectionAmount=' + finalAmount + 
        '&withShipping=' + encodeURIComponent(selectedWithShipping);
      
      btn.textContent = '⏳ جاري إرسال طلبك المحاسبي...';
      btn.disabled = true;
      
      try { 
        var response = await fetch(url, {method: 'GET'});
        alert('✅ تم إرسال الطلب بنجاح!\nالمبلغ الصافي المستحق لك: ' + finalAmount + ' ج.م'); 
        this.reset();
        this.collectionAmount.value = "0"; 
        selectRadio('نعم');
        updateRegionsAndShipping();
        cachedOrders = []; // تصفير الكاش لإجبار التطبيق على تحديث البيانات المالية والحالات عند زيارتهم
      }
      catch(err) { 
        alert('❌ خطأ في الاتصال بالخادم: ' + err.message); 
      }
      
      btn.textContent = '🚀 إرسال الطلب للسيستم';
      btn.disabled = false;
    };

    // جلب البيانات الأساسية وحفظها في الكاش لزيادة سرعة التصفح
    async function fetchAllData() {
      if (cachedOrders.length > 0) return cachedOrders;
      
      var company = localStorage.getItem('userCompany');
      var res = await fetch(SCRIPT_URL + '?company=' + encodeURIComponent(company));
      var data = await res.json();
      cachedOrders = data.orders || [];
      return cachedOrders;
    }

    async function refreshCurrentStatusTab() {
      cachedOrders = []; // مسح الكاش
      await fetchAllData();
      renderFilteredStatus(currentActiveStatus);
    }

    // فلترة وعرض شحنات الحالات (كل تبويب يفلتر بناءً على الحالة الخاصة به)
    async function renderFilteredStatus(statusKey) {
      var container = document.getElementById('statusTableContainer');
      container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted)">⏳ جاري فلترة وجلب شحناتك...</div>';
      
      try {
        var orders = await fetchAllData();
        
        // خريطة لفلترة الأسماء المختلفة للحالات القادمة من شيت جوجل
        var filterFunc = function(o) {
          var s = String(o.status).trim();
          if (statusKey === 'delivering') return s === 'قيد التوصيل';
          if (statusKey === 'in_warehouse') return s === 'في المخزن' || s === 'المخزن';
          if (statusKey === 'delivered') return s === 'تم التسليم';
          if (statusKey === 'failed') return s === 'تعذر التسليم' || s === 'رفض الاستلام' || s === 'مرفوض' || s === 'مرتجع';
          if (statusKey === 'waiting') return s === 'انتظار الشحن' || s === 'قيد الانتظار';
          if (statusKey === 'redelivery') return s === 'إعادة التوصيل' || s === 'اعادة التوصيل';
          return false;
        };

        var filtered = orders.filter(filterFunc);
        
        if (filtered.length > 0) {
          var t = '<table><tr><th>العميل</th><th>الهاتف</th><th>العنوان</th><th>الحالة</th></tr>';
          for (var i = 0; i < filtered.length; i++) {
            var o = filtered[i];
            var st = getStatusDetails(o.status);
            
            var cleanAddress = o.address || '';
            if (cleanAddress.length > 25) {
              cleanAddress = cleanAddress.substring(0, 22) + '...';
            }
            
            t += '<tr>';
            t += '<td style="font-weight:600;">' + o.client + '</td>';
            t += '<td>' + o.phone + '</td>';
            t += '<td title="'+ o.address +'">' + cleanAddress + '</td>';
            t += '<td><span class="status-badge-inline" style="background:'+ st.bg +'; color:'+ st.color +'"><i class="fa-solid '+ st.icon +'"></i> ' + st.text + '</span></td>';
            t += '</tr>';
          }
          t += '</table>';
          container.innerHTML = t;
        } else {
          var arabicStateName = {
            'delivering': 'قيد التوصيل',
            'in_warehouse': 'في المخزن',
            'delivered': 'تم التسليم',
            'failed': 'تعذر التسليم',
            'waiting': 'انتظار الشحن',
            'redelivery': 'إعادة التوصيل'
          }[statusKey];
          
          container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-folder-open"></i>لا توجد أي شحنات حالتها <b>('+ arabicStateName +')</b> مسجلة حالياً.</div>';
        }
      } catch(err) {
        container.innerHTML = '<p style="color:var(--danger); text-align:center; padding:20px;">❌ خطأ في معالجة البيانات: ' + err.message + '</p>';
      }
    }

    // عرض شاشة الحسابات والمالية
    async function loadFinancialData() {
      var c = document.getElementById('financialTableContainer');
      c.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted)">⏳ جاري تحميل كشف الحساب والماليات...</div>';
      
      try {
        var orders = await fetchAllData();
        
        if (orders.length > 0) {
          var t = '<table><tr><th>التاريخ</th><th>العميل</th><th>المبلغ المستحق</th><th>الحساب</th></tr>';
          var totalNotAccounted = 0;
          
          for (var i = 0; i < orders.length; i++) {
            var s = orders[i];
            var accounted = s.accounted || '';
            var isAccounted = (accounted === 'تم' || accounted === 'نعم' || accounted === 'yes' || accounted === '✓');
            
            var rawAmount = String(s.amount || '0').trim();
            var parsedAmount = 0;
            
            if (rawAmount.startsWith('(') && rawAmount.endsWith(')')) {
              parsedAmount = -parseFloat(rawAmount.replace(/[^\d.]/g, '')) || 0;
            } else {
              var cleanAmount = rawAmount.replace(/[^-\d.]/g, '');
              parsedAmount = parseFloat(cleanAmount) || 0;
            }
            
            if (!isAccounted) {
              totalNotAccounted += parsedAmount;
            }
            
            t += '<tr>';
            t += '<td>' + s.date + '</td>';
            t += '<td>' + s.client + '</td>';
            t += '<td style="direction:ltr;' + (parsedAmount < 0 ? 'color:var(--danger);font-weight:bold;' : '') + '">' + s.amount + ' ج.م</td>';
            t += '<td>' + (isAccounted ? '<span style="color:var(--success); font-weight:bold;">✅ محاسب</span>' : '<span style="color:var(--danger); font-weight:bold;">❌ معلق</span>') + '</td>';
            t += '</tr>';
          }
          
          t += '</table>';
          
          var totalClass = totalNotAccounted < 0 ? 'total-box negative' : 'total-box';
          t += '<div class="' + totalClass + '"> إجمالي تحصيلاتك المعلقة: ' + totalNotAccounted.toFixed(2) + ' EGP</div>';
          c.innerHTML = t;
        } else {
          c.innerHTML = '<div class="empty-state"><i class="fa-solid fa-calculator"></i>لا توجد قيود مالية أو طلبات مسجلة بعد.</div>';
        }
      } catch(err) {
        c.innerHTML = '<p style="color:var(--danger); text-align:center; padding:20px;">❌ خطأ: ' + err.message + '</p>';
      }
    }
  </script>
