<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Zone Express</title>
  <style>
    :root {
      --primary-color: #111111;
      --secondary-color: #333333;
      --accent-color: #00b4d8;
      --bg-gradient: linear-gradient(135deg, #f4f7f6, #e9ecef);
      --card-bg: #ffffff;
      --text-main: #2b2d42;
      --text-muted: #6c757d;
      --success: #2ec4b6;
      --danger: #e63946;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    body { 
      background: var(--bg-gradient); 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
      color: var(--text-main);
    }
    
    .container { 
      background: var(--card-bg); 
      padding: 35px 30px; 
      border-radius: 24px; 
      width: 100%; 
      max-width: 520px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container img {
      max-width: 220px;
      height: auto;
    }
    
    .form-group { margin-bottom: 20px; }
    
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: var(--secondary-color); 
      font-weight: 600;
      font-size: 14px;
    }
    
    input, select { 
      width: 100%; 
      padding: 14px; 
      border: 2px solid #e2e8f0; 
      border-radius: 12px; 
      font-size: 14px; 
      color: var(--text-main);
      background-color: #f8fafc;
      transition: all 0.2s ease-in-out;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      background-color: #fff;
      outline: none;
      box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05);
    }
    
    .radio-group { display: flex; gap: 12px; margin-top: 5px; }
    
    .radio-option { 
      flex: 1; 
      padding: 12px; 
      border: 2px solid #e2e8f0; 
      border-radius: 12px; 
      text-align: center; 
      cursor: pointer; 
      font-weight: 600;
      font-size: 14px;
      background: #f8fafc;
      transition: all 0.2s ease;
    }
    
    .radio-option.selected { 
      border-color: var(--primary-color); 
      background: var(--primary-color);
      color: #fff;
    }
    
    button { 
      width: 100%; 
      padding: 15px; 
      background: var(--primary-color); 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-size: 16px; 
      font-weight: bold; 
      cursor: pointer; 
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(17,17,17,0.15);
    }

    button:hover {
      background: #222222;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }
    
    button:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-red { background: #222; margin-top: 15px; border: 2px solid #e2e8f0; color: var(--danger); box-shadow: none; }
    .btn-red:hover { background: #fff5f5; border-color: var(--danger); }
    
    .tabs { 
      display: flex; 
      margin-bottom: 25px; 
      gap: 10px; 
      background: #f1f5f9;
      padding: 6px;
      border-radius: 14px;
    }
    
    .tab { 
      flex: 1; 
      padding: 10px; 
      text-align: center; 
      cursor: pointer; 
      border-radius: 10px; 
      font-size: 13px; 
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }
    
    .tab.active { 
      background: #ffffff; 
      color: var(--primary-color); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    
    .form-section { display: none; animation: fadeIn 0.4s ease; }
    .form-section.active { display: block; }
    
    .total-box { 
      background: var(--success); 
      color: white; 
      padding: 16px; 
      border-radius: 12px; 
      margin-top: 20px; 
      text-align: center; 
      font-weight: bold; 
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(46, 196, 182, 0.2);
    }
    .total-box.negative { 
      background: var(--danger); 
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);
    }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; font-size: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
    th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; color: var(--secondary-color); font-weight: 700; border-bottom: 2px solid #e2e8f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: #f8fafc; }
    
    .shipping-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-style: italic; }
    
    .company-badge {
      background: #f1f5f9;
      color: var(--primary-color);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
      font-size: 15px;
      font-weight: 700;
      border: 1px dashed #cbd5e1;
    }

    .track-card {
      background: #f8fafc;
      padding: 20px;
      border-radius: 14px;
      margin-top: 15px;
      border: 2px solid #e2e8f0;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- تعديل: دمج اللوجو بدقة وبشكل فخم -->
    <div class="logo-container">
      <img src="logo.jpg" alt="ShipZone Logo">
    </div>
    
    <div id="loginSection">
      <div class="form-group">
        <label>📧 البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label>🔑 كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button id="loginBtn">🔐 تسجيل الدخول</button>
    </div>
    
    <div id="appSections" style="display:none;">
      <div class="company-badge">
        👤 متجر: <span id="companyName"></span>
      </div>
      
      <div class="tabs">
        <div class="tab" onclick="showTab('new')">📦 طلب جديد</div>
        <div class="tab" onclick="showTab('myorders')">💰 كشف حساب</div>
        <div class="tab" onclick="showTab('track')">🔍 تتبع شحنة</div>
      </div>
      
      <form id="orderForm" class="form-section">
        <div class="form-group">
          <label>👤 اسم العميل</label>
          <input type="text" name="clientName" required placeholder="الاسم ثلاثي">
        </div>
        <div class="form-group">
          <label>📱 رقم الهاتف</label>
          <input type="tel" name="phone" required placeholder="01xxxxxxxxx">
        </div>
        
        <div class="form-group">
          <label>📍 المحافظة</label>
          <select id="governorateSelect" name="governorate" onchange="updateRegionsAndShipping()" required>
            <option value="">-- اختر المحافظة --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🗺️ المنطقة / المدينة / المركز</label>
          <select id="regionSelect" name="region" required disabled>
            <option value="">-- اختر المحافظة أولاً --</option>
          </select>
        </div>

        <div class="form-group">
          <label>🏠 العنوان بالتفصيل</label>
          <input type="text" name="address" required placeholder="اسم الشارع، رقم العقار، الدور...">
        </div>
        <div class="form-group">
          <label>📦 حجم الشحنة</label>
          <select name="weight" required>
            <option value="">-- اختر الحجم --</option>
            <option value="صغير">صغير (طرد عادي)</option>
            <option value="متوسط">متوسط (وزن متوسط)</option>
            <option value="كبير">كبير (وزن ثقيل)</option>
          </select>
        </div>
        <div class="form-group">
          <label>💰 المبلغ الكلي المستلم من العميل</label>
          <input type="number" name="collectionAmount" step="any" min="-99999" value="0" required>
        </div>
        <div class="form-group">
          <label id="shippingLabel">💵 خصم مصاريف الشحن؟</label>
          <div class="radio-group">
            <div class="radio-option selected" id="radioYes" onclick="selectRadio('نعم')">نعم</div>
            <div class="radio-option" id="radioNo" onclick="selectRadio('لا')">لا</div>
          </div>
          <div id="shippingCostNote" class="shipping-note">يرجى اختيار محافظة لمعرفة سعر الشحن</div>
        </div>
        <button type="submit">🚀 إرسال الطلب للسيستم</button>
      </form>
      
      <div id="myOrdersForm" class="form-section">
        <button onclick="loadMyOrders()">🔄 تحديث وجلب البيانات</button>
        <div id="ordersTableContainer"></div>
      </div>
      
      <form id="trackForm" class="form-section">
        <div class="form-group">
          <label>📱 رقم هاتف العميل للبحث</label>
          <input type="tel" id="searchPhone" required placeholder="01xxxxxxxxx">
        </div>
        <button type="submit">🔍 ابحث الآن</button>
        <div id="statusResult"></div>
      </form>
      
      <button class="btn-red" onclick="logout()">🚪 تسجيل خروج</button>
    </div>
  </div>

    window.onload = function() {
      var govSelect = document.getElementById('governorateSelect');
      for (var gov in locationData) {
        var opt = document.createElement('option');
        opt.value = gov;
        opt.innerHTML = gov;
        govSelect.appendChild(opt);
      }
      
      if(localStorage.getItem('userCompany')) {
        document.getElementById('companyName').textContent = localStorage.getItem('userCompany');
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSections').style.display = 'block';
        showTab('new');
      }
    };

    function updateRegionsAndShipping() {
      var govSelect = document.getElementById('governorateSelect');
      var regionSelect = document.getElementById('regionSelect');
      var note = document.getElementById('shippingCostNote');
      var label = document.getElementById('shippingLabel');
      
      var selectedGov = govSelect.value;
      
      if (!selectedGov) {
        regionSelect.innerHTML = '<option value="">-- اختر المحافظة أولاً --</option>';
        regionSelect.disabled = true;
        currentShippingCost = 0;
        note.innerHTML = 'يرجى اختيار محافظة لمعرفة سعر الشحن';
        label.innerHTML = '💵 خصم مصاريف الشحن؟';
        return;
      }
      
      currentShippingCost = locationData[selectedGov].cost;
      note.innerHTML = 'تكلفة الشحن لهذه المحافظة هي: ' + currentShippingCost + ' ج.م';
      label.innerHTML = '💵 خصم مصاريف الشحن (' + currentShippingCost + ' ج.م)؟';
      
      regionSelect.innerHTML = '<option value="">-- اختر المنطقة / المدينة / المركز --</option>';
      var regions = locationData[selectedGov].regions;
      for (var i = 0; i < regions.length; i++) {
        var opt = document.createElement('option');
        opt.value = regions[i];
        opt.innerHTML = regions[i];
        regionSelect.appendChild(opt);
      }
      regionSelect.disabled = false;
    }

    document.getElementById('loginBtn').onclick = function() {
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;
      
      if (companies[email] && companies[email].pass === password) {
        localStorage.setItem('userCompany', companies[email].name);
        localStorage.setItem('userEmail', email);
        document.getElementById('companyName').textContent = companies[email].name;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSections').style.display = 'block';

    function logout() {
      localStorage.removeItem('userCompany');
      localStorage.removeItem('userEmail');
      location.reload();
    }
    
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.form-section').forEach(function(f) { f.classList.remove('active'); });
      if (tab === 'new') { document.querySelectorAll('.tab')[0].classList.add('active'); document.getElementById('orderForm').classList.add('active'); }
      else if (tab === 'myorders') { document.querySelectorAll('.tab')[1].classList.add('active'); document.getElementById('myOrdersForm').classList.add('active'); }
      else { document.querySelectorAll('.tab')[2].classList.add('active'); document.getElementById('trackForm').classList.add('active'); }
    }
    
    function selectRadio(v) {
      selectedWithShipping = v;
      document.getElementById('radioYes').classList.remove('selected');
      document.getElementById('radioNo').classList.remove('selected');
      document.getElementById('radio' + v).classList.add('selected');
    }
    
    document.getElementById('orderForm').onsubmit = async function(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button');
      var company = localStorage.getItem('userCompany');
      
      var inputAmount = parseFloat(this.collectionAmount.value);
      if (isNaN(inputAmount)) inputAmount = 0; 
      
      var finalAmount = inputAmount;
      
      if (selectedWithShipping === 'نعم') {
        finalAmount = inputAmount - currentShippingCost; 
      }
      
      var fullAddress = this.governorate.value + " - " + this.region.value + " - " + this.address.value;
      
      var url = SCRIPT_URL + '?action=add' +
        '&company=' + encodeURIComponent(company) +
        '&clientName=' + encodeURIComponent(this.clientName.value) +
        '&phone=' + encodeURIComponent(this.phone.value) +
        '&address=' + encodeURIComponent(fullAddress) +
        '&weight=' + encodeURIComponent(this.weight.value) +
        '&collectionAmount=' + finalAmount + 
        '&withShipping=' + encodeURIComponent(selectedWithShipping);
      
      btn.textContent = '⏳ جاري إرسال طلبك المحاسبي...';
      btn.disabled = true;
      
      try { 
        var response = await fetch(url, {method: 'GET'});
        alert('✅ تم إرسال الطلب بنجاح!\nالمبلغ الصافي المستحق لك: ' + finalAmount + ' ج.م'); 
        this.reset();
        this.collectionAmount.value = "0"; 
        selectRadio('نعم');
        updateRegionsAndShipping(); 
      }
      catch(err) { 
        alert('❌ خطأ في الاتصال بالخادم: ' + err.message); 
        console.error(err);
      }
      
      btn.textContent = '🚀 إرسال الطلب للسيستم';
      btn.disabled = false;
    };
    
    document.getElementById('trackForm').onsubmit = async function(e) {
      e.preventDefault();
      var phone = this.searchPhone.value;
      var company = localStorage.getItem('userCompany');
      var r = document.getElementById('statusResult');
      r.innerHTML = '<div class="track-card">⏳ جاري البحث عن بيانات الشحنة...</div>';
      try {
        var res = await fetch(SCRIPT_URL + '?company=' + encodeURIComponent(company) + '&phone=' + phone);
        var data = await res.json();
        if (data.orders && data.orders.length) {
          var o = data.orders[data.orders.length-1];
          r.innerHTML = '<div class="track-card" style="border-color:var(--success); background:#f0fdfa;">' +
                        '<h3 style="color:var(--primary-color); margin-bottom:5px;">👤 '+o.client+'</h3>' +
                        '<h2 style="color:var(--success); margin-bottom:8px;">'+o.status+'</h2>' +
                        '<p style="font-weight:bold;">💰 الصافي: '+o.amount+' ج.م</p>' +
                        '</div>';
        } else { r.innerHTML = '<div class="track-card" style="border-color:var(--danger); color:var(--danger)">❌ لا توجد شحنات مسجلة بهذا الرقم لهذا المتجر</div>'; }
      } catch(err) { r.innerHTML = '<div class="track-card" style="border-color:var(--danger); color:var(--danger)">❌ حدث خطأ أثناء جلب البيانات</div>'; }
    };
    
    async function loadMyOrders() {
      var company = localStorage.getItem('userCompany');
      var c = document.getElementById('ordersTableContainer');
      c.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted)">⏳ جاري تحميل كشف الحساب وتحديث البيانات...</div>';
      try {
        var res = await fetch(SCRIPT_URL + '?company=' + encodeURIComponent(company));
        var data = await res.json();
        if (data.orders && data.orders.length) {
          var t = '<table><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>الحساب</th></tr>';
          var totalNotAccounted = 0;
          
          for (var i = 0; i < data.orders.length; i++) {
            var s = data.orders[i];
            var accounted = s.accounted || '';
            var isAccounted = (accounted === 'تم' || accounted === 'نعم' || accounted === 'yes' || accounted === '✓');
            
            var rawAmount = String(s.amount || '0').trim();
            var parsedAmount = 0;
            
            if (rawAmount.startsWith('(') && rawAmount.endsWith(')')) {
              parsedAmount = -parseFloat(rawAmount.replace(/[^\d.]/g, '')) || 0;
            } else {
              var cleanAmount = rawAmount.replace(/[^-\d.]/g, '');
              parsedAmount = parseFloat(cleanAmount) || 0;
            }
            
            if (!isAccounted) {
              totalNotAccounted += parsedAmount;
            }
            
            t += '<tr>';
            t += '<td>' + s.date + '</td>';
            t += '<td>' + s.client + '</td>';
            t += '<td style="direction:ltr;' + (parsedAmount < 0 ? 'color:var(--danger);font-weight:bold;' : '') + '">' + s.amount + '</td>';
            t += '<td style="font-weight:600; color:' + (s.status === 'تم التسليم' ? 'var(--success)' : 'orange') + '">' + s.status + '</td>';
            t += '<td>' + (isAccounted ? '✅ محاسب' : '❌ معلق') + '</td>';
            t += '</tr>';
          }
          
          t += '</table>';
          
          var totalClass = totalNotAccounted < 0 ? 'total-box negative' : 'total-box';
          t += '<div class="' + totalClass + '"> إجمالي مستحقاتك المعلقة: ' + totalNotAccounted.toFixed(2) + ' EGP</div>';
          c.innerHTML = t;
        } else {
          c.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;">لا توجد طلبات مسجلة بعد لهذا المتجر.</p>';
        }
      } catch(err) {
        c.innerHTML = '<p style="color:var(--danger); text-align:center; padding:20px;">❌ خطأ: ' + err.message + '</p>';
      }
    }
  </script>
</body>
</html>
